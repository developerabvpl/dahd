<div class="login-wrap">
  <div class="login-card">
    <h1>DAHD</h1>
    <p class="sub">UP Veterinary Pharmacy MIS — sign in</p>

    <form (ngSubmit)="submit()" #f="ngForm">
      <label>
        <span>Username</span>
        <input name="username" [(ngModel)]="username" autocomplete="username" required />
      </label>
      <label>
        <span>Password</span>
        <input name="password" type="password" [(ngModel)]="password" autocomplete="current-password" required />
      </label>

      @if (error()) {
        <div class="err">{{ error() }}</div>
      }

      <button type="submit" class="primary" [disabled]="busy() || f.invalid">
        {{ busy() ? 'Signing in...' : 'Sign in' }}
      </button>

      <p style="font-size:0.82rem; color:#6b7d90; margin: 0.6rem 0 0">
        New vendor? <a routerLink="/vendor-register">Apply for empanelment</a>
      </p>
    </form>

    <details class="demo">
      <summary>Demo accounts</summary>
      <table>
        <thead><tr><th>User</th><th>Password</th><th>Role</th><th></th></tr></thead>
        <tbody>
          @for (d of demoUsers; track d.user) {
            <tr>
              <td>{{ d.user }}</td>
              <td><code>{{ d.pass }}</code></td>
              <td>{{ d.role }}</td>
              <td><button type="button" (click)="fill(d.user, d.pass)">Use</button></td>
            </tr>
          }
        </tbody>
      </table>
    </details>
  </div>
</div>
