<div class="layout">
  <aside class="sidebar">
    <div class="brand">
      <h1>DAHD</h1>
      <p>UP Veterinary Pharmacy MIS</p>
    </div>

    <div class="status">
      <span class="dot" [class.online]="online()" [class.offline]="!online()"></span>
      <span class="label">{{ online() ? 'Online' : 'Offline' }}</span>
      @if (pending() > 0) {
        <button type="button" class="pending" (click)="drainNow()" [disabled]="!online() || draining()">
          {{ draining() ? 'Syncing...' : pending() + ' queued' }}
        </button>
      }
    </div>

    <nav>
      <a routerLink="/dashboard" routerLinkActive="active">Dashboard</a>
      <a routerLink="/drugs" routerLinkActive="active">Drugs &amp; Vaccines</a>
      <a routerLink="/warehouses" routerLinkActive="active">Warehouses</a>
      <a routerLink="/facilities" routerLinkActive="active">Facilities &amp; MVU</a>
      <a routerLink="/batches" routerLinkActive="active">Batches</a>
      <a routerLink="/stock" routerLinkActive="active">Stock</a>
      <a routerLink="/indents" routerLinkActive="active">Indents</a>
      <a routerLink="/coldchain" routerLinkActive="active">Cold Chain</a>
      <a routerLink="/dispense" routerLinkActive="active">Dispense</a>
      <a routerLink="/audit" routerLinkActive="active">Audit Log</a>
    </nav>
    <footer>
      @if (user(); as u) {
        <div class="userchip">
          <div class="name">{{ u.displayName }}</div>
          <div class="role">{{ u.role }}</div>
        </div>
        <button class="logout" (click)="logout()">Sign out</button>
      }
      <small>v0.3 &middot; Phase 2 (offline-first)</small>
    </footer>
  </aside>
  <main class="content">
    <router-outlet />
  </main>
</div>
